name: Playwright Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox]
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: autodoc
          POSTGRES_PASSWORD: autodoc
          POSTGRES_DB: autodoc
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTODOC_E2E: '1'
      DATABASE_URL: postgresql+asyncpg://autodoc:autodoc@localhost:5432/autodoc
      DEFAULT_MODEL: stub
      EMBEDDING_MODEL: stub
      PLAYWRIGHT_BASE_URL: http://localhost:4173
      PLAYWRIGHT_API_BASE: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: uv sync --extra dev
      - working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps ${{ matrix.project }}
      - run: uv run alembic upgrade head
      - working-directory: web
        run: npm run build
      - run: nohup uv run uvicorn src.main:app --host 0.0.0.0 --port 8080 > api.log 2>&1 &
      - working-directory: web
        run: nohup npx vite preview --port 4173 --host 0.0.0.0 > preview.log 2>&1 &
      - working-directory: web
        # Generate BDD spec files before Playwright runs (defineBddConfig
        # alone doesn't trigger codegen on a fresh tree).
        run: npx bddgen test -c tests/e2e/playwright.config.ts
      - working-directory: web
        # Post-migration: the chromium/firefox projects ARE the BDD projects
        # (legacy bdd-* names were renamed back to chromium/firefox when
        # specs/ retired). Matrix entry directly names the project.
        run: npx playwright test --config tests/e2e/playwright.config.ts --project=${{ matrix.project }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-${{ matrix.project }}
          path: |
            web/playwright-report
            web/test-results
