name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: Lint E2E tests
        run: uv run ruff check tests/e2e/
      - name: Format check E2E tests
        run: uv run ruff format --check tests/e2e/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit/ -x -q --ignore=tests/unit/test_mcp_server.py

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -x -v -m e2e

  playwright-pr:
    name: Playwright (Chromium, stubbed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: autodoc
          POSTGRES_PASSWORD: autodoc
          POSTGRES_DB: autodoc
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTODOC_E2E: '1'
      DATABASE_URL: postgresql+asyncpg://autodoc:autodoc@localhost:5432/autodoc
      DEFAULT_MODEL: stub
      EMBEDDING_MODEL: stub
      PLAYWRIGHT_BASE_URL: http://localhost:4173
      PLAYWRIGHT_API_BASE: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: uv sync --extra dev
      - name: Install playwright browsers
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Build web
        working-directory: web
        run: npm run build
      - name: Start API
        run: nohup uv run uvicorn src.main:app --host 0.0.0.0 --port 8080 > api.log 2>&1 &
      - name: Start web preview
        working-directory: web
        run: nohup npx vite preview --port 4173 --host 0.0.0.0 > preview.log 2>&1 &
      - name: Run Playwright
        working-directory: web
        run: npx playwright test --config tests/e2e/playwright.config.ts --project=chromium
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-report
          path: |
            web/playwright-report
            web/test-results
