# Dev-k8s: point DB and Redis to Docker Compose services on host
apiVersion: v1
kind: Secret
metadata:
  name: autodoc-db-credentials
  namespace: autodoc
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://autodoc:autodoc@host.docker.internal:5432/autodoc"
  PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://autodoc:autodoc@host.docker.internal:5432/prefect"
---
apiVersion: v1
kind: Secret
metadata:
  name: autodoc-redis-credentials
  namespace: autodoc
type: Opaque
stringData:
  PREFECT_REDIS_MESSAGING_HOST: "host.docker.internal"
  PREFECT_REDIS_MESSAGING_PORT: "6379"
