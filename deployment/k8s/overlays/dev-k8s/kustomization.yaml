apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: autodoc-api
    newTag: latest
  - name: autodoc-web
    newTag: latest
  - name: autodoc-worker
    newTag: latest
  - name: autodoc-flow
    newTag: latest

patches:
  - path: patches/replicas.yaml
  - path: patches/config.yaml
  - path: patches/secrets.yaml
  - path: patches/resource-quota.yaml
  - path: patches/prefect-api.yaml
  - path: patches/ingress.yaml
