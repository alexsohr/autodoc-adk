# Production: replace with external managed PostgreSQL and Redis credentials
apiVersion: v1
kind: Secret
metadata:
  name: autodoc-db-credentials
  namespace: autodoc
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://CHANGE_ME_USER:CHANGE_ME_PASS@CHANGE_ME_HOST:5432/autodoc"
  PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://CHANGE_ME_USER:CHANGE_ME_PASS@CHANGE_ME_HOST:5432/prefect"
---
apiVersion: v1
kind: Secret
metadata:
  name: autodoc-redis-credentials
  namespace: autodoc
type: Opaque
stringData:
  PREFECT_REDIS_MESSAGING_HOST: "CHANGE_ME_REDIS_HOST"
  PREFECT_REDIS_MESSAGING_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: autodoc-api-keys
  namespace: autodoc
type: Opaque
stringData:
  GOOGLE_API_KEY: "CHANGE_ME"
  OPENAI_API_KEY: "CHANGE_ME"
  GITHUB_DEFAULT_TOKEN: "CHANGE_ME"
