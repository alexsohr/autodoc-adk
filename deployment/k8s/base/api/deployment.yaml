apiVersion: apps/v1
kind: Deployment
metadata:
  name: autodoc-api
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: autodoc
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: autodoc-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: autodoc-db-credentials
                  key: DATABASE_URL
            - name: PREFECT_API_URL
              value: "http://prefect-api:4200/api"
          envFrom:
            - configMapRef:
                name: autodoc-config
            - secretRef:
                name: autodoc-api-keys
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
