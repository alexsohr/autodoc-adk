apiVersion: apps/v1
kind: Deployment
metadata:
  name: scope-worker
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
    app.kubernetes.io/component: scope-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: scope-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: autodoc
        app.kubernetes.io/component: scope-worker
    spec:
      serviceAccountName: prefect-worker
      containers:
        - name: worker
          image: autodoc-worker:latest
          command: ["prefect", "worker", "start", "--pool", "k8s-pool"]
          env:
            - name: PREFECT_API_URL
              value: "http://prefect-api:4200/api"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
