apiVersion: v1
kind: Secret
metadata:
  name: autodoc-db-credentials
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
type: Opaque
stringData:
  # Application database (asyncpg connection string)
  DATABASE_URL: "postgresql+asyncpg://autodoc:CHANGE_ME@postgres-host:5432/autodoc"
  # Prefect Server database (asyncpg connection string)
  PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://autodoc:CHANGE_ME@postgres-host:5432/prefect"
