apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-api
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
    app.kubernetes.io/component: prefect-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: prefect-api
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: autodoc
        app.kubernetes.io/component: prefect-api
    spec:
      containers:
        - name: prefect-api
          image: prefecthq/prefect:3-latest
          command: ["prefect", "server", "start", "--no-services"]
          ports:
            - containerPort: 4200
              protocol: TCP
          env:
            - name: PREFECT_SERVER_API_HOST
              value: "0.0.0.0"
            - name: PREFECT_API_DATABASE_MIGRATE_ON_START
              value: "false"
            - name: PREFECT_API_DATABASE_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: autodoc-db-credentials
                  key: PREFECT_API_DATABASE_CONNECTION_URL
            - name: PREFECT_REDIS_MESSAGING_HOST
              valueFrom:
                secretKeyRef:
                  name: autodoc-redis-credentials
                  key: PREFECT_REDIS_MESSAGING_HOST
            - name: PREFECT_REDIS_MESSAGING_PORT
              valueFrom:
                secretKeyRef:
                  name: autodoc-redis-credentials
                  key: PREFECT_REDIS_MESSAGING_PORT
          envFrom:
            - configMapRef:
                name: autodoc-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
