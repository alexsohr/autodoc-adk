apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autodoc-ingress
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.autodoc.example.com
        - prefect.autodoc.example.com
      secretName: autodoc-tls
  rules:
    - host: api.autodoc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autodoc-api
                port:
                  number: 8080
    - host: prefect.autodoc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prefect-api
                port:
                  number: 4200
