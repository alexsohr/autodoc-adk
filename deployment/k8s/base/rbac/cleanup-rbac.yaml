apiVersion: v1
kind: ServiceAccount
metadata:
  name: autodoc-job-cleanup
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
    app.kubernetes.io/component: cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autodoc-job-cleanup
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
    app.kubernetes.io/component: cleanup
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autodoc-job-cleanup
  namespace: autodoc
  labels:
    app.kubernetes.io/part-of: autodoc
    app.kubernetes.io/component: cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: autodoc-job-cleanup
subjects:
  - kind: ServiceAccount
    name: autodoc-job-cleanup
    namespace: autodoc
