# =============================================================================
# docker-compose.dev.yml — Infrastructure-only for dev-k8s profile
# =============================================================================
# Provides PostgreSQL and Redis for the dev-k8s deployment profile where
# application components run on K8s (minikube/kind) and connect to these
# Docker services on the host.
#
# Usage:
#   cd deployment/docker
#   docker compose -f docker-compose.dev.yml up -d
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: autodoc
      POSTGRES_USER: autodoc
      POSTGRES_PASSWORD: autodoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodoc -d autodoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
