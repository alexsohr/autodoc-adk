<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDoc ADK — Architecture Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden}
.container{display:flex;height:100vh}
.sidebar{width:320px;min-width:320px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;overflow-y:hidden}
.sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;padding:14px 16px 8px;border-bottom:1px solid #21262d}
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#8b949e;padding:10px 16px 4px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#0d1117}
.prompt-bar{background:#161b22;border-top:1px solid #30363d;padding:12px 16px;max-height:180px;display:flex;gap:10px;align-items:flex-start}
.prompt-bar pre{flex:1;font-family:'SF Mono',Consolas,monospace;font-size:12px;line-height:1.5;color:#c9d1d9;white-space:pre-wrap;max-height:150px;overflow-y:auto}
.prompt-bar button{background:#238636;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
.prompt-bar button:hover{background:#2ea043}
.prompt-bar button.copied{background:#1f6feb}
.preset-grid{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 12px}
.preset-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .15s}
.preset-btn:hover{border-color:#58a6ff;color:#58a6ff}
.preset-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.layer-item,.conn-item{display:flex;align-items:center;gap:8px;padding:5px 16px;cursor:pointer;font-size:13px;transition:background .1s}
.layer-item:hover,.conn-item:hover{background:#21262d}
.layer-item input,.conn-item input{accent-color:#58a6ff}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.conn-line{width:20px;height:3px;flex-shrink:0;border-radius:1px}
.zoom-controls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px}
.zoom-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{border-color:#58a6ff;color:#58a6ff}
.detail-panel{padding:12px 16px;border-top:1px solid #21262d}
.detail-panel .dp-title{font-size:14px;font-weight:600;color:#f0f6fc}
.detail-panel .dp-path{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#8b949e;margin:3px 0 8px}
.detail-panel .dp-desc{font-size:12px;color:#c9d1d9;line-height:1.4;margin-bottom:8px}
.detail-panel .dp-section{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin:8px 0 4px}
.dp-tag{display:inline-block;background:#21262d;border:1px solid #30363d;color:#79c0ff;padding:2px 7px;border-radius:4px;font-size:11px;font-family:'SF Mono',Consolas,monospace;margin:2px}
.dp-env{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#7ee787;padding:1px 0}
.comment-form{margin-top:10px}
.comment-form textarea{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:6px;padding:8px;font-size:12px;resize:vertical;min-height:50px;font-family:system-ui}
.comment-form textarea:focus{outline:none;border-color:#58a6ff}
.comment-form button{margin-top:6px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px}
.comment-form button:hover{border-color:#58a6ff}
.comment-list{padding:0 16px 12px}
.comment-item{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;position:relative}
.comment-item .ci-target{font-size:11px;font-weight:600;color:#79c0ff}
.comment-item .ci-text{font-size:12px;color:#c9d1d9;margin-top:3px}
.comment-item .ci-del{position:absolute;top:6px;right:8px;background:none;border:none;color:#f85149;cursor:pointer;font-size:14px;padding:0 4px}
.legend{position:absolute;bottom:12px;left:12px;background:rgba(22,27,34,.92);border:1px solid #30363d;border-radius:8px;padding:10px 14px;display:flex;gap:16px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-line{width:24px;height:0;border-top:2.5px solid}
.legend-line.dashed{border-top-style:dashed}
.legend-line.dotted{border-top-style:dotted}
svg text{user-select:none}
.node-group{cursor:pointer}
.node-group:hover rect{filter:brightness(1.25)}
.node-group.highlighted rect{stroke-width:2.5}
.node-group.commented rect{stroke-dasharray:4 2}
.connection-path{fill:none;stroke-width:1.8;transition:opacity .2s}
.connection-path.dimmed{opacity:.08}
.connection-path.highlighted{stroke-width:3;opacity:1}
.marker-arrow{fill:currentColor}
.search-box{padding:8px 16px}
.search-box input{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:6px;padding:6px 10px;font-size:12px}
.search-box input:focus{outline:none;border-color:#58a6ff}
.tab-bar{display:flex;border-bottom:1px solid #21262d}
.tab-btn{flex:1;background:none;border:none;color:#8b949e;padding:8px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent}
.tab-btn.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;flex:1;min-height:0}
#tab-details,#tab-comments,#tab-views{overflow-y:auto}
.toolbar{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:6px;z-index:10;background:rgba(22,27,34,.92);border:1px solid #30363d;border-radius:8px;padding:4px 8px}
.toolbar-group{display:flex;gap:2px}
.toolbar-sep{width:1px;height:20px;background:#30363d;margin:0 4px}
.toolbar-btn,.toolbar-toggle{background:none;border:1px solid transparent;color:#8b949e;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s}
.toolbar-btn:hover,.toolbar-toggle:hover{color:#c9d1d9;background:#21262d}
.toolbar-btn.active{color:#fff;background:#1f6feb;border-color:#1f6feb}
.toolbar-toggle.active{color:#f0f6fc;background:#238636;border-color:#238636}
.toolbar-toggle.active:hover{background:#2ea043}
.node-group.impact-source rect{stroke:#f97316!important;stroke-width:3!important;filter:drop-shadow(0 0 8px rgba(249,115,22,.6))}
.node-group.impact-affected rect{stroke:#ef4444!important;stroke-width:2.5!important;filter:drop-shadow(0 0 6px rgba(239,68,68,.4))}
.node-group.impact-safe{opacity:.25}
.node-group.path-node rect{stroke:#8b5cf6!important;stroke-width:2.5!important;filter:drop-shadow(0 0 6px rgba(139,92,246,.5))}
.node-group.path-endpoint rect{stroke:#8b5cf6!important;stroke-width:3!important;filter:drop-shadow(0 0 10px rgba(139,92,246,.7))}
.node-group.path-dimmed{opacity:.15}
.connection-path.path-highlight{stroke:#8b5cf6!important;stroke-width:3.5!important;opacity:1!important;stroke-dasharray:none!important}
.path-hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(139,92,246,.9);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;pointer-events:none;z-index:10}
.layer-item .collapse-btn{margin-left:auto;background:none;border:none;color:#8b949e;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}
.layer-item .collapse-btn:hover{color:#58a6ff;background:#21262d}
.collapsed-node rect{stroke-dasharray:6 3}
.code-drawer{position:absolute;top:0;right:-420px;width:420px;height:100%;background:#0d1117;border-left:1px solid #30363d;transition:right .25s ease;z-index:20;display:flex;flex-direction:column}
.code-drawer.open{right:0}
.drawer-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #21262d;flex-shrink:0}
.drawer-header span{font-size:13px;font-weight:600;color:#f0f6fc}
.drawer-close{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;padding:0 4px}
.drawer-close:hover{color:#f85149}
.drawer-code{flex:1;overflow:auto;padding:14px;font-family:'SF Mono',Consolas,monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9;white-space:pre;tab-size:4;margin:0}
.drawer-code .kw{color:#ff7b72}
.drawer-code .fn{color:#d2a8ff}
.drawer-code .str{color:#a5d6ff}
.drawer-code .cm{color:#8b949e;font-style:italic}
.drawer-code .tp{color:#79c0ff}
.drawer-code .dec{color:#ffa657}
.seq-phase-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.seq-step-rect{cursor:pointer;transition:filter .15s}
.seq-step-rect:hover{filter:brightness(1.3)}
.seq-step-num{font-size:10px;font-weight:700;fill:#8b949e}
.seq-step-label{font-size:11px;fill:#f0f6fc}
.seq-step-duration{font-size:10px;fill:#8b949e;font-family:'SF Mono',Consolas,monospace}
.seq-connector{stroke:#30363d;stroke-width:1.5}
.matrix-cell{cursor:pointer;transition:opacity .15s}
.matrix-cell:hover{opacity:.8!important}
.matrix-label{font-size:10px;fill:#c9d1d9}
.matrix-pkg-label{font-size:10px;fill:#c9d1d9;font-family:'SF Mono',Consolas,monospace}
.matrix-header{font-size:9px;fill:#8b949e;font-weight:600}
.matrix-divider{stroke:#21262d;stroke-width:0.5}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>AutoDoc ADK Architecture</h2>
    <div class="search-box"><input id="search" type="text" placeholder="Search components..."></div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="views">Views</button>
      <button class="tab-btn" data-tab="details">Details</button>
      <button class="tab-btn" data-tab="comments">Notes</button>
    </div>
    <div id="tab-views" class="tab-content active">
      <h3>Presets</h3>
      <div class="preset-grid" id="presets"></div>
      <h3>Layers</h3>
      <div id="layer-toggles"></div>
      <h3>Connections</h3>
      <div id="conn-toggles"></div>
    </div>
    <div id="tab-details" class="tab-content">
      <div id="detail-content" class="detail-panel" style="color:#8b949e;font-size:13px">Click a component to see details</div>
    </div>
    <div id="tab-comments" class="tab-content">
      <div id="comment-list" class="comment-list" style="padding-top:8px"></div>
    </div>
  </div>
  <div class="main">
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="toolbar" id="toolbar">
        <div class="toolbar-group">
          <button class="toolbar-btn active" data-mode="spatial" title="Spatial diagram">Spatial</button>
          <button class="toolbar-btn" data-mode="sequence" title="Job execution timeline">Sequence</button>
          <button class="toolbar-btn" data-mode="packages" title="Package dependency matrix">Packages</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="toolbar-toggle" data-overlay="impact" title="Impact analysis">Impact</button>
          <button class="toolbar-toggle" data-overlay="pathfinder" title="Path finder">Path</button>
          <button class="toolbar-toggle" data-overlay="k8s" title="K8s status overlay">K8s</button>
        </div>
      </div>
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoom(0.15)">+</button>
        <button class="zoom-btn" onclick="zoom(-0.15)">−</button>
        <button class="zoom-btn" onclick="resetView()" style="font-size:11px">⟲</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-line" style="border-color:#3b82f6"></div>Data Flow</div>
        <div class="legend-item"><div class="legend-line dashed" style="border-color:#10b981"></div>Tool / LLM Call</div>
        <div class="legend-item"><div class="legend-line dashed" style="border-color:#f97316"></div>Async / Event</div>
        <div class="legend-item"><div class="legend-line dotted" style="border-color:#6b7280"></div>Dependency</div>
      </div>
      <div id="code-drawer" class="code-drawer">
        <div class="drawer-header">
          <span id="drawer-title">Code Preview</span>
          <button class="drawer-close" onclick="closeDrawer()">&times;</button>
        </div>
        <pre id="drawer-code" class="drawer-code"></pre>
      </div>
    </div>
    <div class="prompt-bar">
      <pre id="prompt-output">Explore the architecture — click components to add notes, toggle layers to focus.</pre>
      <button id="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// LAYER & CONNECTION DEFINITIONS
// ════════════════════════════════════════════════════════════════
const LAYERS = {
  external:       { label: 'External Services',  color: '#3b82f6', fill: '#172554' },
  api:            { label: 'API Layer',           color: '#f59e0b', fill: '#422006' },
  orchestration:  { label: 'Orchestration',       color: '#22c55e', fill: '#14532d' },
  agents:         { label: 'Agent Pipeline',      color: '#a855f7', fill: '#3b0764' },
  services:       { label: 'Services',            color: '#06b6d4', fill: '#083344' },
  data:           { label: 'Data Layer',          color: '#ec4899', fill: '#500724' },
  infrastructure: { label: 'Infrastructure',      color: '#6b7280', fill: '#1f2937' }
};

const CONN_TYPES = {
  'data-flow':   { label: 'Data Flow',      color: '#3b82f6', dash: '' },
  'tool-call':   { label: 'Tool / LLM Call', color: '#10b981', dash: '7,4' },
  'async-event': { label: 'Async / Event',  color: '#f97316', dash: '5,5' },
  'dependency':  { label: 'Dependency',      color: '#6b7280', dash: '3,3' }
};

// ════════════════════════════════════════════════════════════════
// NODE DEFINITIONS
// ════════════════════════════════════════════════════════════════
const W = 172, H = 54;
const nodes = [
  // ── External ──
  { id:'git-providers', label:'Git Providers', subtitle:'GitHub / GitLab / Bitbucket', layer:'external',
    x:80, y:35, w:W, h:H,
    desc:'Provider abstraction for clone, PR creation, and commit comparison APIs.',
    path:'src/providers/{github,bitbucket}.py',
    packages:['httpx','gitpython'],
    envs:['GITHUB_TOKEN','GITLAB_TOKEN'],
    codeSnippet: null },
  { id:'llm-providers', label:'LLM Providers', subtitle:'Gemini / OpenAI / Azure / Bedrock', layer:'external',
    x:420, y:35, w:190, h:H,
    desc:'Multi-provider LLM access via ADK native Gemini + LiteLLM wrapper for others.',
    path:'src/config/models.py',
    packages:['google-adk','litellm'],
    envs:['DEFAULT_MODEL','STRUCTURE_GENERATOR_MODEL','PAGE_GENERATOR_MODEL','PAGE_CRITIC_MODEL','README_GENERATOR_MODEL'],
    codeSnippet: null },
  { id:'s3-storage', label:'AWS S3', subtitle:'Session archival', layer:'external',
    x:760, y:35, w:145, h:H,
    desc:'Object storage for archiving ADK agent sessions after each flow run.',
    path:'src/services/session.py',
    packages:['boto3'],
    envs:['SESSION_ARCHIVE_BUCKET','AWS_REGION'],
    codeSnippet: null },
  { id:'otel-collector', label:'OTEL Collector', subtitle:'Traces & structured logs', layer:'external',
    x:1060, y:35, w:W, h:H,
    desc:'OpenTelemetry collector receives traces and correlated structured logs (trace_id + span_id).',
    path:'src/config/telemetry.py',
    packages:['opentelemetry-sdk','opentelemetry-exporter-otlp-proto-grpc','opentelemetry-instrumentation-logging'],
    envs:['OTEL_ENABLED','OTEL_EXPORTER_OTLP_ENDPOINT','OTEL_SERVICE_NAME'],
    codeSnippet: null },

  // ── API ──
  { id:'fastapi-app', label:'FastAPI App', subtitle:'src/main.py', layer:'api',
    x:20, y:155, w:155, h:H,
    desc:'Application entry point — lifespan management, exception handlers, CORS, telemetry init. Auth deferred to reverse proxy.',
    path:'src/main.py + src/api/app.py',
    packages:['fastapi','uvicorn','pydantic-settings'],
    envs:['API_HOST','API_PORT'],
    codeSnippet: null },
  { id:'repos-api', label:'Repository API', subtitle:'src/api/routes/repositories.py', layer:'api',
    x:215, y:155, w:W, h:H,
    desc:'CRUD for repositories — register, list (cursor-paginated), update branch_mappings, delete with cascade.',
    path:'src/api/routes/repositories.py',
    packages:['fastapi','sqlalchemy'],
    envs:[],
    codeSnippet: null },
  { id:'jobs-api', label:'Jobs API', subtitle:'src/api/routes/jobs.py', layer:'api',
    x:425, y:155, w:W, h:H,
    desc:'Job lifecycle — create (full/incremental), list, cancel, retry. Idempotent: same params returns existing PENDING/RUNNING job.',
    path:'src/api/routes/jobs.py',
    packages:['fastapi','prefect'],
    envs:['AUTODOC_FLOW_DEPLOYMENT_PREFIX'],
    codeSnippet: '@router.post("/jobs")\nasync def create_job(\n    request: JobCreateRequest,\n    repo_repo = Depends(get_repository_repo),\n    job_repo = Depends(get_job_repo)\n) -> JobResponse:\n    # Idempotent: same params returns existing PENDING/RUNNING\n    existing = await job_repo.find_active(\n        request.repository_id, request.branch, request.mode\n    )\n    if existing:\n        return JobResponse.from_orm(existing)\n    job = await job_repo.create(request)\n    # Trigger Prefect flow\n    if request.mode == "full":\n        await run_deployment("full-generation", ...)\n    else:\n        await run_deployment("incremental-update", ...)\n    return JobResponse.from_orm(job)' },
  { id:'docs-api', label:'Documents API', subtitle:'src/api/routes/documents.py', layer:'api',
    x:635, y:155, w:W, h:H,
    desc:'Query generated docs — scopes, hybrid search (semantic+FTS), individual pages, full wiki. Accepts ?branch= and ?scope= params.',
    path:'src/api/routes/documents.py',
    packages:['fastapi','sqlalchemy'],
    envs:[],
    codeSnippet: null },
  { id:'webhooks-api', label:'Webhooks', subtitle:'src/api/routes/webhooks.py', layer:'api',
    x:845, y:155, w:155, h:H,
    desc:'POST /webhooks/push — normalizes GitHub/GitLab/Bitbucket push events and triggers incremental jobs.',
    path:'src/api/routes/webhooks.py',
    packages:['fastapi','httpx'],
    envs:[],
    codeSnippet: '@router.post("/webhooks/push")\nasync def handle_push_webhook(\n    request: Request,\n    repo_repo: RepositoryRepo = Depends(get_repository_repo)\n) -> WebhookResponse:\n    """Normalize GitHub/GitLab/Bitbucket push → incremental job"""\n    payload = await request.json()\n    provider = detect_provider(request.headers)\n    event = normalize_push_event(provider, payload)\n    repo = await repo_repo.get_by_url(event.repo_url)\n    if not repo:\n        raise HTTPException(404, "Repository not registered")\n    job = await create_incremental_job(\n        repository_id=repo.id,\n        branch=event.branch,\n        commit_sha=event.after_sha\n    )\n    return WebhookResponse(job_id=job.id, status="accepted")' },
  { id:'mcp-server', label:'MCP Server', subtitle:'src/mcp_server.py', layer:'api',
    x:1040, y:155, w:W, h:H,
    desc:'FastMCP server exposing find_repository and query_documents tools for external AI agents.',
    path:'src/mcp_server.py',
    packages:['fastmcp'],
    envs:[],
    codeSnippet: 'mcp = FastMCP("autodoc")\n\n@mcp.tool()\nasync def find_repository(search: str) -> list[dict]:\n    """Find repositories matching name/URL/org."""\n    return await repo_repo.search(search)\n\n@mcp.tool()\nasync def query_documents(\n    repository_id: str, query: str,\n    branch: str = None, scope: str = None, limit: int = 10\n) -> list[dict]:\n    """Search generated documentation (semantic + FTS)."""\n    return await search_documents(\n        UUID(repository_id), query, branch, scope, limit\n    )' },

  // ── Orchestration ──
  { id:'full-generation', label:'Full Generation', subtitle:'src/flows/full_generation.py', layer:'orchestration',
    x:100, y:285, w:195, h:H,
    desc:'@flow: Clone → scan → discover .autodoc.yaml → fan out scope_processing as parallel K8s jobs → create PR → cleanup.',
    path:'src/flows/full_generation.py',
    packages:['prefect'],
    envs:['PREFECT_WORK_POOL','MAX_REPO_SIZE','MAX_TOTAL_FILES'],
    codeSnippet: '@flow(name="full_generation", retries=0)\nasync def full_generation_flow(\n    repository_id: UUID, branch: str, job_id: UUID,\n    force: bool = False, dry_run: bool = False\n) -> JobResult:\n    repo = await get_repository(repository_id)\n    repo_path, commit_sha = await clone_repository(repo, branch)\n    file_tree = await scan_file_tree(repo_path)\n    configs = await discover_autodoc_configs(repo_path)\n    # Fan out scope processing as parallel K8s jobs\n    scope_results = []\n    for config in configs:\n        result = await run_deployment(\n            "scope-processing",\n            parameters={"repo_path": repo_path, "config": config},\n            work_pool_name=settings.PREFECT_WORK_POOL\n        )\n        scope_results.append(result)\n    if not dry_run:\n        await create_autodoc_pr(repo, branch, scope_results)\n    await cleanup_workspace(repo_path)' },
  { id:'incremental-update', label:'Incremental Update', subtitle:'src/flows/incremental_update.py', layer:'orchestration',
    x:415, y:285, w:200, h:H,
    desc:'@flow: Compare commits via provider API → determine affected scopes → regenerate only changed pages. SHA baseline: min(commit_sha) across scopes.',
    path:'src/flows/incremental_update.py',
    packages:['prefect'],
    envs:['PREFECT_WORK_POOL'],

    codeSnippet: 'def chunk_page(\n    content: str, title: str,\n    max_tokens: int = 512, overlap: int = 50\n) -> list[PageChunk]:\n    """Two-stage: heading-aware split → recursive fallback."""\n    sections = split_by_headings(content)\n    chunks = []\n    for section in sections:\n        if count_tokens(section.text) <= max_tokens:\n            chunks.append(PageChunk(\n                content=section.text,\n                heading_path=section.heading_path,\n                context_prefix=f"{title} > {" > ".join(section.heading_path)}"\n            ))\n        else:\n            # Recursive fallback for large sections\n            sub = recursive_split(section.text, max_tokens, overlap)\n            chunks.extend(sub)\n    return chunks' },

    codeSnippet: 'async def generate_embeddings(\n    pages: list[WikiPage], settings: Settings\n) -> list[PageChunk]:\n    chunks = []\n    for page in pages:\n        page_chunks = chunk_page(\n            page.content, page.title,\n            max_tokens=settings.CHUNK_MAX_TOKENS,\n            overlap=settings.CHUNK_OVERLAP_TOKENS\n        )\n        chunks.extend(page_chunks)\n    # Batch embed\n    for batch in batched(chunks, settings.EMBEDDING_BATCH_SIZE):\n        texts = [c.context_prefix + c.content for c in batch]\n        vectors = await embed_texts(texts, model=settings.EMBEDDING_MODEL)\n        for chunk, vec in zip(batch, vectors):\n            chunk.content_embedding = vec\n    return chunks' },

    codeSnippet: 'async def search_documents(\n    repo_id: UUID, query: str, branch: str = None,\n    scope: str = None, limit: int = 10\n) -> list[SearchResult]:\n    """Hybrid search: RRF(semantic, full-text)"""\n    embedding = await generate_embedding(query)\n    # Semantic: cosine similarity on page_chunks\n    semantic = await search_chunks_by_vector(\n        embedding, repo_id, branch, scope, limit=limit*3\n    )\n    semantic_pages = aggregate_to_pages(semantic)\n    # Full-text: GIN index on wiki_pages.content\n    fts = await search_pages_by_text(\n        query, repo_id, branch, scope, limit=limit*3\n    )\n    # Reciprocal Rank Fusion (k=60)\n    return rrf_merge(semantic_pages, fts, k=60, limit=limit)' },

// ════════════════════════════════════════════════════════════════
const state = {
  layers: { external:true, api:true, orchestration:true, agents:true, services:true, data:true, infrastructure:true },
  conns: { 'data-flow':true, 'tool-call':true, 'async-event':true, 'dependency':false },
  comments: [],
  selectedNode: null,
  hoveredNode: null,
  activePreset: 'Full System',
  zoom: 1,
  panX: 0,
  panY: 0,
  search: '',
  _rendering: false,
  canvasMode: 'spatial',
  overlays: { impact: false, pathfinder: false, k8s: false },
  impactSource: null,
  pathStart: null,
  pathEnd: null,
  collapsedLayers: {},
  drawerNode: null,
  k8sStatus: {}
};

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const downstream = {};
const upstream = {};
nodes.forEach(n => { downstream[n.id] = []; upstream[n.id] = []; });
connections.forEach(c => {
  if (nodeMap[c.from] && nodeMap[c.to]) {
    downstream[c.from].push({ target: c.to, type: c.type, label: c.label });
    upstream[c.to].push({ source: c.from, type: c.type, label: c.label });
  }
});

function getDownstream(startId, includeTypes) {
  const visited = new Set();
  const queue = [startId];
  visited.add(startId);
  while (queue.length) {
    const id = queue.shift();
    for (const edge of downstream[id] || []) {
      if (includeTypes && !includeTypes.has(edge.type)) continue;
      if (!visited.has(edge.target)) {
        visited.add(edge.target);
        queue.push(edge.target);
      }
    }
  }
  visited.delete(startId);
  return visited;
}

function getUpstream(startId, includeTypes) {
  const visited = new Set();
  const queue = [startId];
  visited.add(startId);
  while (queue.length) {
    const id = queue.shift();
    for (const edge of upstream[id] || []) {
      if (includeTypes && !includeTypes.has(edge.type)) continue;
      if (!visited.has(edge.source)) {
        visited.add(edge.source);
        queue.push(edge.source);
      }
    }
  }
  visited.delete(startId);
  return visited;
}

function findPath(startId, endId) {
  if (startId === endId) return [startId];
  const visited = new Set([startId]);
  const queue = [[startId]];
  while (queue.length) {
    const path = queue.shift();
    const current = path[path.length - 1];
    const neighbors = [
      ...(downstream[current] || []).map(e => e.target),
      ...(upstream[current] || []).map(e => e.source)
    ];
    for (const next of neighbors) {
      if (next === endId) return [...path, next];
      if (!visited.has(next)) {
        visited.add(next);
        queue.push([...path, next]);
      }
    }
  }
  return null;
}

// ════════════════════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════════════════════
const svg = document.getElementById('canvas');
const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  if (parent) parent.appendChild(e);
  return e;
}

function setupMarkers() {
  const defs = el('defs', {}, svg);
  Object.entries(CONN_TYPES).forEach(([type, cfg]) => {
    const m = el('marker', { id:'arrow-'+type, markerWidth:'8', markerHeight:'6', refX:'7', refY:'3', orient:'auto' }, defs);
    el('polygon', { points:'0 0, 8 3, 0 6', fill:cfg.color }, m);
  });
}

function getConnPoints(from, to) {
  const fx = from.x + from.w/2, fy = from.y + from.h/2;
  const tx = to.x + to.w/2, ty = to.y + to.h/2;
  const dy = Math.abs(fy - ty), dx = Math.abs(fx - tx);
  if (dy > dx * 0.4) {
    if (fy < ty) return { x1:fx, y1:from.y+from.h, x2:tx, y2:to.y };
    return { x1:fx, y1:from.y, x2:tx, y2:to.y+to.h };
  }
  if (fx < tx) return { x1:from.x+from.w, y1:fy, x2:to.x, y2:ty };
  return { x1:from.x, y1:fy, x2:to.x+to.w, y2:ty };
}

function isNodeVisible(n) {
  if (!state.layers[n.layer]) return false;
  if (state.search && !n.label.toLowerCase().includes(state.search) && !n.subtitle.toLowerCase().includes(state.search)) return false;
  return true;
}

function isConnVisible(c) {
  if (!state.conns[c.type]) return false;
  const fn = nodeMap[c.from], tn = nodeMap[c.to];
  return fn && tn && isNodeVisible(fn) && isNodeVisible(tn);
}

function getNodeConns(nodeId) {
  return connections.filter(c => (c.from === nodeId || c.to === nodeId) && state.conns[c.type]);
}

function render() {
  if (state._rendering) return;
  state._rendering = true;
  try {
    if (state.canvasMode === 'sequence') { renderSequence(); updatePrompt(); return; }
    if (state.canvasMode === 'packages') { renderPackageMatrix(); updatePrompt(); return; }
    renderSpatial();
  } finally {
    state._rendering = false;
  }
}

function renderSequence() {
  svg.innerHTML = '';
  const stepH = 48;
  const barX = 120, barW = 500;
  let y = 60;
  let currentPhase = null;

  // Compute total height
  let totalH = 60;
  let prevPhase = null;
  SEQUENCE_STEPS.forEach(s => {
    if (s.phase !== prevPhase) { totalH += 22; prevPhase = s.phase; }
    totalH += stepH;
  });
  totalH += 40;

  svg.setAttribute('viewBox', `0 0 900 ${totalH}`);

  // Title
  el('text', { x:'450', y:'30', fill:'#f0f6fc', 'font-size':'16', 'font-weight':'700', 'text-anchor':'middle' }, svg)
    .textContent = 'Full Generation Job Timeline';

  SEQUENCE_STEPS.forEach((s, i) => {
    const n = nodeMap[s.node];
    const phaseCfg = PHASES[s.phase];

    // Phase divider
    if (s.phase !== currentPhase) {
      currentPhase = s.phase;
      el('line', { x1:'40', y1:String(y), x2:'860', y2:String(y), stroke:phaseCfg.color, 'stroke-width':'0.5', opacity:'0.4' }, svg);
      el('text', { x:'50', y:String(y + 14), fill:phaseCfg.color, class:'seq-phase-label' }, svg)
        .textContent = phaseCfg.label;
      y += 22;
    }

    // Connector
    if (i > 0) {
      el('line', { x1:String(barX + barW/2), y1:String(y - stepH + 32), x2:String(barX + barW/2), y2:String(y), class:'seq-connector' }, svg);
    }

    // Step bar
    const layerCfg = n ? LAYERS[n.layer] : { fill:'#1f2937', color:'#6b7280' };
    const g = el('g', { class:'seq-step-rect' }, svg);
    el('rect', {
      x:String(barX), y:String(y), width:String(barW), height:'32', rx:'6', ry:'6',
      fill:layerCfg.fill, stroke:layerCfg.color, 'stroke-width':'1'
    }, g);

    // Step number
    el('text', { x:String(barX - 20), y:String(y + 20), class:'seq-step-num', 'text-anchor':'end' }, svg)
      .textContent = String(s.step);

    // Label
    el('text', { x:String(barX + 12), y:String(y + 20), class:'seq-step-label' }, g)
      .textContent = s.label;

    // Duration
    el('text', { x:String(barX + barW - 12), y:String(y + 20), class:'seq-step-duration', 'text-anchor':'end' }, g)
      .textContent = s.duration;

    // Component name
    if (n) {
      el('text', { x:String(barX + barW + 15), y:String(y + 20), fill:layerCfg.color, 'font-size':'10', 'font-weight':'600' }, svg)
        .textContent = n.label;
    }

    // Click to show details
    if (n) {
      g.addEventListener('click', () => {
        showDetail(n.id);
        switchTab('details');
      });
    }

    y += stepH;
  });

  // Total estimate
  el('text', { x:'450', y:String(y + 20), fill:'#8b949e', 'font-size':'12', 'text-anchor':'middle' }, svg)
    .textContent = 'Estimated total: 3-8 minutes per scope (depends on page count and LLM latency)';

  svg.style.transform = `scale(${state.zoom}) translate(${state.panX}px, ${state.panY}px)`;
  svg.style.transformOrigin = 'top left';
}

function renderPackageMatrix() {
  svg.innerHTML = '';

  const componentsWithPkgs = nodes.filter(n => n.packages && n.packages.length > 0);
  const allPkgs = [...new Set(componentsWithPkgs.flatMap(n => n.packages))].sort();

  const cellSize = 24;
  const labelPadW = 220;
  const labelPadH = 140;
  const gridW = componentsWithPkgs.length * cellSize;
  const gridH = allPkgs.length * cellSize;

  svg.setAttribute('viewBox', `0 0 ${labelPadW + gridW + 40} ${labelPadH + gridH + 60}`);

  // Title
  el('text', { x:String((labelPadW + gridW) / 2), y:'20', fill:'#f0f6fc', 'font-size':'14', 'font-weight':'700', 'text-anchor':'middle' }, svg)
    .textContent = 'Package Dependency Matrix';

  // Column headers (rotated component names)
  componentsWithPkgs.forEach((n, ci) => {
    const x = labelPadW + ci * cellSize + cellSize / 2;
    const t = el('text', {
      x: String(x), y: String(labelPadH - 8),
      class: 'matrix-header',
      transform: `rotate(-55, ${x}, ${labelPadH - 8})`
    }, svg);
    t.textContent = n.label;
  });

  // Rows and cells
  allPkgs.forEach((pkg, ri) => {
    const y = labelPadH + ri * cellSize;

    // Package name
    el('text', {
      x: String(labelPadW - 8), y: String(y + cellSize / 2 + 3),
      class: 'matrix-pkg-label', 'text-anchor': 'end'
    }, svg).textContent = pkg;

    // Row divider
    el('line', { x1: String(labelPadW), y1: String(y), x2: String(labelPadW + gridW), y2: String(y), class: 'matrix-divider' }, svg);

    // Cells
    componentsWithPkgs.forEach((n, ci) => {
      const x = labelPadW + ci * cellSize;
      const used = n.packages.includes(pkg);
      const layerCfg = LAYERS[n.layer];

      const rect = el('rect', {
        x: String(x + 1), y: String(y + 1),
        width: String(cellSize - 2), height: String(cellSize - 2),
        rx: '3', ry: '3',
        fill: used ? layerCfg.color : '#161b22',
        opacity: used ? '0.85' : '0.3',
        class: 'matrix-cell'
      }, svg);

      const title = el('title', {}, rect);
      title.textContent = used ? `${n.label} uses ${pkg}` : `${n.label} does not use ${pkg}`;

      rect.addEventListener('click', () => {
        showDetail(n.id);
        switchTab('details');
      });
    });
  });

  // Column dividers
  componentsWithPkgs.forEach((_, ci) => {
    const x = labelPadW + ci * cellSize;
    el('line', { x1: String(x), y1: String(labelPadH), x2: String(x), y2: String(labelPadH + gridH), class: 'matrix-divider' }, svg);
  });

  // Legend
  const legendY = labelPadH + gridH + 20;
  el('text', { x: String(labelPadW), y: String(legendY), fill: '#8b949e', 'font-size': '10' }, svg)
    .textContent = 'Cell color = component layer. Click a cell to see component details.';

  let lx = labelPadW;
  Object.entries(LAYERS).forEach(([, cfg]) => {
    el('rect', { x: String(lx), y: String(legendY + 6), width: '10', height: '10', rx: '2', fill: cfg.color, opacity: '0.85' }, svg);
    el('text', { x: String(lx + 14), y: String(legendY + 15), fill: '#8b949e', 'font-size': '9' }, svg).textContent = cfg.label;
    lx += cfg.label.length * 6 + 24;
  });

  svg.style.transform = `scale(${state.zoom}) translate(${state.panX}px, ${state.panY}px)`;
  svg.style.transformOrigin = 'top left';
}

function renderSpatial() {
  svg.innerHTML = '';
  setupMarkers();
  const vb = '0 0 1320 900';
  svg.setAttribute('viewBox', vb);
  svg.style.width = '100%';
  svg.style.height = '100%';

  // Background layer labels
  Object.entries(LAYERS).forEach(([key, cfg]) => {
    if (!state.layers[key]) return;
    const layerNodes = nodes.filter(n => n.layer === key && isNodeVisible(n));
    if (!layerNodes.length) return;
    const minY = Math.min(...layerNodes.map(n => n.y));
    el('text', { x:'8', y:String(minY+12), fill:cfg.color, 'font-size':'10', opacity:'0.5', 'font-weight':'600', 'text-transform':'uppercase', 'letter-spacing':'1' }, svg).textContent = cfg.label.toUpperCase();
  });

  // Compute impact set
  const impactAffected = (state.overlays.impact && state.impactSource)
    ? getDownstream(state.impactSource, new Set(['data-flow', 'tool-call', 'async-event']))
    : null;

  // Compute path
  let pathSet = null;
  let pathEdges = null;
  if (state.overlays.pathfinder && state.pathStart && state.pathEnd) {
    const pathNodes = findPath(state.pathStart, state.pathEnd);
    if (pathNodes) {
      pathSet = new Set(pathNodes);
      pathEdges = new Set();
      for (let i = 0; i < pathNodes.length - 1; i++) {
        pathEdges.add(`${pathNodes[i]}→${pathNodes[i+1]}`);
        pathEdges.add(`${pathNodes[i+1]}→${pathNodes[i]}`);
      }
    }
  }

  // Compute collapsed summaries
  const collapsedSummaries = {};
  Object.entries(state.collapsedLayers).forEach(([layerKey, collapsed]) => {
    if (!collapsed || !state.layers[layerKey]) return;
    const layerNodes = nodes.filter(n => n.layer === layerKey);
    if (!layerNodes.length) return;
    const minX = Math.min(...layerNodes.map(n => n.x));
    const maxX = Math.max(...layerNodes.map(n => n.x + n.w));
    const minY = Math.min(...layerNodes.map(n => n.y));
    const cx = (minX + maxX) / 2;
    const summaryW = Math.min(maxX - minX, 300);
    collapsedSummaries[layerKey] = {
      id: `__collapsed_${layerKey}`,
      label: LAYERS[layerKey].label,
      subtitle: `${layerNodes.length} components`,
      layer: layerKey,
      x: cx - summaryW/2, y: minY, w: summaryW, h: 54,
      nodeIds: layerNodes.map(n => n.id)
    };
  });

  function resolveConnEndpoint(nodeId) {
    const n = nodeMap[nodeId];
    if (!n) return null;
    if (state.collapsedLayers[n.layer] && collapsedSummaries[n.layer]) {
      return collapsedSummaries[n.layer];
    }
    return n;
  }

  // Connections
  const connGroup = el('g', { class:'connections' }, svg);
  const drawnConnPairs = new Set();
  connections.forEach(c => {
    if (!state.conns[c.type]) return;
    const fn = resolveConnEndpoint(c.from);
    const tn = resolveConnEndpoint(c.to);
    if (!fn || !tn) return;
    if (!state.layers[nodeMap[c.from]?.layer] || !state.layers[nodeMap[c.to]?.layer]) return;
    if (state.search && !fn.id.startsWith('__collapsed_') && !isNodeVisible(nodeMap[c.from])) return;
    if (state.search && !tn.id.startsWith('__collapsed_') && !isNodeVisible(nodeMap[c.to])) return;
    if (fn.id === tn.id) return;
    const pairKey = `${fn.id}\u2192${tn.id}\u2192${c.type}`;
    if (drawnConnPairs.has(pairKey)) return;
    drawnConnPairs.add(pairKey);
    const pts = getConnPoints(fn, tn);
    const isVert = Math.abs(pts.y1 - pts.y2) > Math.abs(pts.x1 - pts.x2) * 0.4;
    let d;
    if (isVert) {
      const mid = (pts.y1 + pts.y2) / 2;
      d = `M${pts.x1},${pts.y1} C${pts.x1},${mid} ${pts.x2},${mid} ${pts.x2},${pts.y2}`;
    } else {
      const mid = (pts.x1 + pts.x2) / 2;
      d = `M${pts.x1},${pts.y1} C${mid},${pts.y1} ${mid},${pts.y2} ${pts.x2},${pts.y2}`;
    }
    const cfg = CONN_TYPES[c.type];
    const cls = ['connection-path'];
    if (state.hoveredNode && c.from !== state.hoveredNode && c.to !== state.hoveredNode) cls.push('dimmed');
    if (state.hoveredNode && (c.from === state.hoveredNode || c.to === state.hoveredNode)) cls.push('highlighted');
    if (pathEdges && (pathEdges.has(`${c.from}\u2192${c.to}`) || pathEdges.has(`${c.to}\u2192${c.from}`))) {
      cls.push('path-highlight');
    }
    const attrs = { d, stroke:cfg.color, class:cls.join(' '), 'marker-end':'url(#arrow-'+c.type+')' };
    if (cfg.dash) attrs['stroke-dasharray'] = cfg.dash;
    const path = el('path', attrs, connGroup);
    // Tooltip
    const title = el('title', {}, path);
    title.textContent = c.label || `${fn.label} \u2192 ${tn.label}`;
  });

  // Nodes
  nodes.forEach(n => {
    if (!isNodeVisible(n)) return;
    if (state.collapsedLayers[n.layer]) return;  // skip - shown as summary
    const cfg = LAYERS[n.layer];
    const g = el('g', { class:'node-group', 'data-id':n.id }, svg);
    if (state.selectedNode === n.id) g.classList.add('highlighted');
    if (state.comments.some(c => c.target === n.id)) g.classList.add('commented');

    el('rect', {
      x:n.x, y:n.y, width:n.w, height:n.h, rx:'8', ry:'8',
      fill:cfg.fill, stroke:cfg.color, 'stroke-width': state.selectedNode===n.id ? '2.5' : '1.2'
    }, g);
    el('text', {
      x:n.x+n.w/2, y:n.y+20, fill:'#f0f6fc', 'font-size':'12', 'font-weight':'600', 'text-anchor':'middle'
    }, g).textContent = n.label;
    el('text', {
      x:n.x+n.w/2, y:n.y+35, fill:'#8b949e', 'font-size':'9.5', 'text-anchor':'middle', 'font-family':'SF Mono,Consolas,monospace'
    }, g).textContent = n.subtitle.length > 28 ? n.subtitle.slice(0,26)+'…' : n.subtitle;

    // Comment indicator
    const cc = state.comments.filter(c => c.target === n.id).length;
    if (cc > 0) {
      el('circle', { cx:n.x+n.w-6, cy:n.y+6, r:'7', fill:'#f97316' }, g);
      el('text', { x:n.x+n.w-6, y:n.y+10, fill:'#fff', 'font-size':'9', 'text-anchor':'middle', 'font-weight':'700' }, g).textContent = cc;
    }

    // Impact analysis classes
    if (impactAffected) {
      if (n.id === state.impactSource) {
        g.classList.add('impact-source');
      } else if (impactAffected.has(n.id)) {
        g.classList.add('impact-affected');
      } else {
        g.classList.add('impact-safe');
      }
    }

    // Path finder classes
    if (pathSet) {
      if (n.id === state.pathStart || n.id === state.pathEnd) g.classList.add('path-endpoint');
      else if (pathSet.has(n.id)) g.classList.add('path-node');
      else g.classList.add('path-dimmed');
    }

    // Events
    g.addEventListener('click', () => selectNode(n.id));
    g.addEventListener('mouseenter', () => { state.hoveredNode = n.id; render(); });
    g.addEventListener('mouseleave', () => { state.hoveredNode = null; render(); });
  });

  // Collapsed summary nodes
  Object.values(collapsedSummaries).forEach(summary => {
    const cfg = LAYERS[summary.layer];
    const g = el('g', { class: 'node-group collapsed-node' }, svg);
    el('rect', {
      x: summary.x, y: summary.y, width: summary.w, height: '54', rx: '8', ry: '8',
      fill: cfg.fill, stroke: cfg.color, 'stroke-width': '1.5', 'stroke-dasharray': '6 3'
    }, g);
    el('text', {
      x: summary.x + summary.w/2, y: summary.y + 20, fill: '#f0f6fc',
      'font-size': '12', 'font-weight': '600', 'text-anchor': 'middle'
    }, g).textContent = summary.label;
    el('text', {
      x: summary.x + summary.w/2, y: summary.y + 35, fill: '#8b949e',
      'font-size': '10', 'text-anchor': 'middle'
    }, g).textContent = summary.subtitle;
    g.addEventListener('click', () => {
      state.collapsedLayers[summary.layer] = false;
      const btn = document.querySelector(`.collapse-btn[data-layer="${summary.layer}"]`);
      if (btn) { btn.textContent = '\u2212'; btn.title = 'Collapse layer'; }
      render();
    });
  });

  // Path hint overlay
  let hintEl = document.getElementById('path-hint');
  if (state.overlays.pathfinder && state.pathStart && !state.pathEnd) {
    if (!hintEl) {
      hintEl = document.createElement('div');
      hintEl.id = 'path-hint';
      hintEl.className = 'path-hint';
      document.getElementById('canvas-wrap').appendChild(hintEl);
    }
    hintEl.textContent = `Start: ${nodeMap[state.pathStart].label} — click destination`;
    hintEl.style.display = 'block';
  } else if (hintEl) {
    hintEl.style.display = 'none';
  }

  // Transform
  const wrap = document.getElementById('canvas-wrap');
  const scale = state.zoom;
  svg.style.transform = `scale(${scale}) translate(${state.panX}px, ${state.panY}px)`;
  svg.style.transformOrigin = 'top left';

  updatePrompt();
}

// ════════════════════════════════════════════════════════════════
// INTERACTION
// ════════════════════════════════════════════════════════════════
function selectNode(id) {
  if (state.overlays.impact && state.canvasMode === 'spatial') {
    state.impactSource = (state.impactSource === id) ? null : id;
    render();
    if (state.impactSource) showImpactDetail(id);
    else showDetail(id);
    switchTab('details');
    return;
  }
  if (state.overlays.pathfinder && state.canvasMode === 'spatial') {
    if (!state.pathStart) {
      state.pathStart = id;
    } else if (!state.pathEnd) {
      if (id === state.pathStart) { state.pathStart = null; }
      else { state.pathEnd = id; }
    } else {
      state.pathStart = id;
      state.pathEnd = null;
    }
    render();
    if (state.pathStart && state.pathEnd) showPathDetail(state.pathStart, state.pathEnd);
    else if (state.pathStart) showPathHint();
    switchTab('details');
    return;
  }
  state.selectedNode = id;
  render();
  showDetail(id);
  switchTab('details');
}

function showDetail(id) {
  const n = nodeMap[id];
  const panel = document.getElementById('detail-content');
  const commentedText = state.comments.filter(c => c.target === id).map(c => c.text).join('\n');
  panel.innerHTML = `
    <div class="dp-title">${n.label}</div>
    <div class="dp-path">${n.path}</div>
    <div class="dp-desc">${n.desc}</div>
    <div class="dp-section">Packages</div>
    <div>${n.packages.length ? n.packages.map(p => `<span class="dp-tag">${p}</span>`).join('') : '<span style="color:#8b949e;font-size:11px">None (external service)</span>'}</div>
    ${n.envs.length ? `<div class="dp-section">Environment Variables</div><div>${n.envs.map(e => `<div class="dp-env">${e}</div>`).join('')}</div>` : ''}
    <div class="dp-section">Layer</div>
    <div><span class="dp-tag" style="border-color:${LAYERS[n.layer].color};color:${LAYERS[n.layer].color}">${LAYERS[n.layer].label}</span></div>
    ${n.codeSnippet ? `<button class="dp-tag" style="cursor:pointer;margin-top:8px;border-color:#a855f7;color:#a855f7" onclick="openDrawer('${id}')">View Code</button>` : ''}
    <div class="comment-form">
      <textarea id="comment-input" placeholder="Add a note about this component..."></textarea>
      <button onclick="addComment('${id}')">Add Note</button>
    </div>
  `;
}

function showImpactDetail(sourceId) {
  const n = nodeMap[sourceId];
  const affected = getDownstream(sourceId, new Set(['data-flow', 'tool-call', 'async-event']));
  const affectedNodes = [...affected].map(id => nodeMap[id]).filter(Boolean);
  const byLayer = {};
  affectedNodes.forEach(an => {
    const layer = LAYERS[an.layer].label;
    if (!byLayer[layer]) byLayer[layer] = [];
    byLayer[layer].push(an.label);
  });
  const panel = document.getElementById('detail-content');
  panel.innerHTML = `
    <div class="dp-title">Impact: ${n.label}</div>
    <div class="dp-path">${n.path}</div>
    <div class="dp-desc">If <strong>${n.label}</strong> fails, <strong>${affected.size}</strong> downstream component${affected.size !== 1 ? 's' : ''} are affected.</div>
    <div class="dp-section">Blast Radius by Layer</div>
    ${Object.entries(byLayer).map(([layer, names]) =>
      `<div style="margin:4px 0"><span style="color:#ef4444;font-weight:600;font-size:11px">${layer}</span><br>${names.map(name => `<span class="dp-tag" style="border-color:#ef4444;color:#fca5a5">${name}</span>`).join('')}</div>`
    ).join('')}
    ${affected.size === 0 ? '<div style="color:#8b949e;font-size:12px;margin-top:8px">This is a leaf node — no downstream dependencies.</div>' : ''}
  `;
}

function showPathDetail(startId, endId) {
  const path = findPath(startId, endId);
  const panel = document.getElementById('detail-content');
  if (!path) {
    panel.innerHTML = `
      <div class="dp-title">No Path Found</div>
      <div class="dp-desc">No connection path between <strong>${nodeMap[startId].label}</strong> and <strong>${nodeMap[endId].label}</strong>.</div>
    `;
    return;
  }
  panel.innerHTML = `
    <div class="dp-title">Path: ${path.length - 1} hop${path.length > 2 ? 's' : ''}</div>
    <div class="dp-desc">${nodeMap[startId].label} → ${nodeMap[endId].label}</div>
    <div class="dp-section">Route</div>
    <div style="margin-top:6px">
      ${path.map((id, i) => {
        const n = nodeMap[id];
        const arrow = i < path.length - 1 ? '<div style="color:#8b5cf6;padding:2px 0 2px 12px">↓</div>' : '';
        return `<div style="display:flex;align-items:center;gap:6px"><span class="dp-tag" style="border-color:${LAYERS[n.layer].color};color:${LAYERS[n.layer].color}">${n.label}</span><span style="font-size:10px;color:#8b949e">${n.path}</span></div>${arrow}`;
      }).join('')}
    </div>
  `;
}

function showPathHint() {
  const panel = document.getElementById('detail-content');
  const start = nodeMap[state.pathStart];
  panel.innerHTML = `
    <div class="dp-title">Path Finder</div>
    <div class="dp-desc">Start: <strong>${start.label}</strong><br>Click a second component to find the path.</div>
  `;
}

function addComment(nodeId) {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  state.comments.push({ id: Date.now(), target: nodeId, targetLabel: nodeMap[nodeId].label, targetFile: nodeMap[nodeId].path, text });
  input.value = '';
  renderComments();
  render();
}

function deleteComment(id) {
  state.comments = state.comments.filter(c => c.id !== id);
  renderComments();
  render();
}

function renderComments() {
  const list = document.getElementById('comment-list');
  if (!state.comments.length) {
    list.innerHTML = '<div style="color:#8b949e;font-size:13px;padding:8px 0">No notes yet. Click a component and add notes to build your prompt.</div>';
    return;
  }
  list.innerHTML = state.comments.map(c => `
    <div class="comment-item">
      <div class="ci-target">${c.targetLabel}</div>
      <div class="ci-text">${c.text}</div>
      <button class="ci-del" onclick="deleteComment(${c.id})">&times;</button>
    </div>
  `).join('');
}

// ════════════════════════════════════════════════════════════════
// PROMPT
// ════════════════════════════════════════════════════════════════
function updatePrompt() {
  const out = document.getElementById('prompt-output');
  const visibleLayers = Object.entries(state.layers).filter(([,v]) => v).map(([k]) => LAYERS[k].label);
  const parts = [];

  if (visibleLayers.length < 7) {
    parts.push(`Focusing on: ${visibleLayers.join(', ')}.`);
  } else {
    parts.push('Showing the full AutoDoc ADK architecture.');
  }

  if (state.comments.length) {
    parts.push('\nComponent notes:');
    state.comments.forEach(c => {
      parts.push(`\n**${c.targetLabel}** (${c.targetFile}):\n${c.text}`);
    });
  }

  if (state.comments.length) {
    parts.push('\nPlease address the notes above, considering the data flow between the highlighted components.');
  }

  if (state.overlays.impact && state.impactSource) {
    const src = nodeMap[state.impactSource];
    const affected = getDownstream(state.impactSource, new Set(['data-flow', 'tool-call', 'async-event']));
    parts.push(`\nImpact analysis for ${src.label} (${src.path}):`);
    parts.push(`${affected.size} downstream components affected: ${[...affected].map(id => nodeMap[id]?.label).filter(Boolean).join(', ')}.`);
  }

  if (state.overlays.pathfinder && state.pathStart && state.pathEnd) {
    const path = findPath(state.pathStart, state.pathEnd);
    if (path) {
      parts.push(`\nData path (${path.length - 1} hops): ${path.map(id => nodeMap[id]?.label).join(' → ')}`);
    }
  }

  out.textContent = parts.join('\n');
}

function copyPrompt() {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ════════════════════════════════════════════════════════════════
// CONTROLS SETUP
// ════════════════════════════════════════════════════════════════
function buildControls() {
  // Presets
  const presetGrid = document.getElementById('presets');
  Object.keys(PRESETS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (state.activePreset === name ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => applyPreset(name);
    presetGrid.appendChild(btn);
  });

  // Layer toggles
  const layerDiv = document.getElementById('layer-toggles');
  Object.entries(LAYERS).forEach(([key, cfg]) => {
    const item = document.createElement('label');
    item.className = 'layer-item';
    item.innerHTML = `<input type="checkbox" ${state.layers[key]?'checked':''} data-layer="${key}"><div class="layer-dot" style="background:${cfg.color}"></div>${cfg.label}`;
    item.querySelector('input').addEventListener('change', e => {
      state.layers[key] = e.target.checked;
      state.activePreset = null;
      updatePresetBtns();
      render();
    });
    const colBtn = document.createElement('button');
    colBtn.className = 'collapse-btn';
    colBtn.textContent = state.collapsedLayers[key] ? '+' : '\u2212';
    colBtn.title = state.collapsedLayers[key] ? 'Expand layer' : 'Collapse layer';
    colBtn.dataset.layer = key;
    colBtn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      state.collapsedLayers[key] = !state.collapsedLayers[key];
      colBtn.textContent = state.collapsedLayers[key] ? '+' : '\u2212';
      colBtn.title = state.collapsedLayers[key] ? 'Expand layer' : 'Collapse layer';
      render();
    });
    item.appendChild(colBtn);
    layerDiv.appendChild(item);
  });

  // Connection toggles
  const connDiv = document.getElementById('conn-toggles');
  Object.entries(CONN_TYPES).forEach(([key, cfg]) => {
    const item = document.createElement('label');
    item.className = 'conn-item';
    const style = cfg.dash ? (cfg.dash === '3,3' ? 'dotted' : 'dashed') : 'solid';
    item.innerHTML = `<input type="checkbox" ${state.conns[key]?'checked':''} data-conn="${key}"><div class="conn-line" style="background:${cfg.color};border-top:3px ${style} ${cfg.color};background:none"></div>${cfg.label}`;
    item.querySelector('input').addEventListener('change', e => {
      state.conns[key] = e.target.checked;
      state.activePreset = null;
      updatePresetBtns();
      render();
    });
    connDiv.appendChild(item);
  });

  // Search
  document.getElementById('search').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase();
    render();
  });

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-'+tab));
}

function applyPreset(name) {
  const p = PRESETS[name];
  state.layers = { ...p.layers };
  state.conns = { ...p.conns };
  state.activePreset = name;

  // Update checkboxes
  document.querySelectorAll('[data-layer]').forEach(cb => cb.checked = state.layers[cb.dataset.layer]);
  document.querySelectorAll('[data-conn]').forEach(cb => cb.checked = state.conns[cb.dataset.conn]);
  updatePresetBtns();
  render();
}

function updatePresetBtns() {
  document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.toggle('active', btn.textContent === state.activePreset));
}

// ════════════════════════════════════════════════════════════════
// ZOOM & PAN
// ════════════════════════════════════════════════════════════════
function zoom(delta) {
  state.zoom = Math.max(0.5, Math.min(2.5, state.zoom + delta));
  render();
}
function resetView() {
  state.zoom = 1; state.panX = 0; state.panY = 0;
  render();
}

let isPanning = false, startX, startY;
document.getElementById('canvas-wrap').addEventListener('mousedown', e => {
  if (e.target.closest('.node-group')) return;
  isPanning = true; startX = e.clientX - state.panX * state.zoom; startY = e.clientY - state.panY * state.zoom;
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  state.panX = (e.clientX - startX) / state.zoom;
  state.panY = (e.clientY - startY) / state.zoom;
  svg.style.transform = `scale(${state.zoom}) translate(${state.panX}px, ${state.panY}px)`;
});
document.addEventListener('mouseup', () => isPanning = false);
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY > 0 ? -0.08 : 0.08);
}, { passive: false });

// ════════════════════════════════════════════════════════════════
// TOOLBAR
// ════════════════════════════════════════════════════════════════
function buildToolbar() {
  document.querySelectorAll('.toolbar-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.canvasMode = btn.dataset.mode;
      if (btn.dataset.mode !== 'spatial') {
        Object.keys(state.overlays).forEach(k => state.overlays[k] = false);
        document.querySelectorAll('.toolbar-toggle').forEach(t => t.classList.remove('active'));
      }
      document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.canvasMode));
      document.querySelectorAll('.toolbar-toggle').forEach(t => {
        t.disabled = state.canvasMode !== 'spatial';
        t.style.opacity = state.canvasMode !== 'spatial' ? '0.4' : '1';
      });
      render();
    });
  });

  document.querySelectorAll('.toolbar-toggle[data-overlay]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.canvasMode !== 'spatial') return;
      const key = btn.dataset.overlay;
      state.overlays[key] = !state.overlays[key];
      btn.classList.toggle('active', state.overlays[key]);
      if (!state.overlays[key]) {
        if (key === 'impact') state.impactSource = null;
        if (key === 'pathfinder') { state.pathStart = null; state.pathEnd = null; }
      }
      render();
    });
  });
}

// ════════════════════════════════════════════════════════════════
// CODE DRAWER
// ════════════════════════════════════════════════════════════════
function openDrawer(nodeId) {
  const n = nodeMap[nodeId];
  if (!n || !n.codeSnippet) return;
  state.drawerNode = nodeId;
  document.getElementById('drawer-title').textContent = n.label;
  document.getElementById('drawer-code').innerHTML = highlightPython(n.codeSnippet);
  document.getElementById('code-drawer').classList.add('open');
}

function closeDrawer() {
  state.drawerNode = null;
  document.getElementById('code-drawer').classList.remove('open');
}

function highlightPython(code) {
  return code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("""[\s\S]*?""")/g, '<span class="cm">$1</span>')
    .replace(/(#[^\n]*)/g, '<span class="cm">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>')
    .replace(/(\'(?:[^\'\\]|\\.)*\')/g, '<span class="str">$1</span>')
    .replace(/\b(def|async|await|class|return|for|if|else|elif|import|from|with|as|not|and|or|in|try|except|finally|raise|None|True|False|self)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(str|int|float|bool|list|dict|set|tuple|UUID|Optional|Callable)\b/g, '<span class="tp">$1</span>')
    .replace(/@(\w+)/g, '<span class="dec">@$1</span>');
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
buildControls();
buildToolbar();
renderComments();
render();
</script>
</body>
</html>
