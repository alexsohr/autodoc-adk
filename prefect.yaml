# Prefect deployment configuration for AutoDoc ADK
# See: https://docs.prefect.io/latest/deploy/infrastructure-concepts/work-pools/
#
# K8s deployments (dev-k8s, prod) bake flow code into the Flow Runner image
# (Dockerfile.flow). No remote code storage is needed — the worker tells
# Prefect to set_working_directory to /app inside the container.
#
# Dev deployments use local-dev work pool (process-based, runs in-process).

name: autodoc-adk

# Flow code is baked into the Docker image at /app — no remote pull needed.
# The pull step just sets the working directory so Prefect finds the entrypoint.
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

definitions:
  # Reusable work pool configs with image reference
  work_pools:
    orchestrator: &orchestrator_pool
      name: orchestrator-pool
      job_variables:
        image: "{{ $AUTODOC_FLOW_IMAGE | default('autodoc-flow:latest') }}"
    k8s: &k8s_pool
      name: k8s-pool
      job_variables:
        image: "{{ $AUTODOC_FLOW_IMAGE | default('autodoc-flow:latest') }}"
    local: &local_pool
      name: local-dev

deployments:
  # ---- Dev (Docker Compose, in-process) ------------------------------------

  - name: dev-full-generation
    entrypoint: src/flows/full_generation.py:full_generation_flow
    work_pool: *local_pool
    pull: []
    tags: [autodoc, full-generation, dev]

  - name: dev-scope-processing
    entrypoint: src/flows/scope_processing.py:scope_processing_flow
    work_pool: *local_pool
    pull: []
    tags: [autodoc, scope-processing, dev]

  - name: dev-incremental
    entrypoint: src/flows/incremental_update.py:incremental_update_flow
    work_pool: *local_pool
    pull: []
    tags: [autodoc, incremental, dev]

  - name: dev-cleanup
    entrypoint: src/flows/tasks/cleanup.py:cleanup_orphan_workspaces
    work_pool: *local_pool
    pull: []
    schedules:
      - cron: "*/15 * * * *"
        timezone: "UTC"
    tags: [autodoc, cleanup, dev]

  # ---- Dev-K8s (hybrid: Docker infra + K8s app) ---------------------------
  # Code baked into autodoc-flow image. build: [] skips Prefect image build.

  - name: dev-k8s-full-generation
    entrypoint: src/flows/full_generation.py:full_generation_flow
    work_pool: *orchestrator_pool
    build: []
    tags: [autodoc, full-generation, dev-k8s]

  - name: dev-k8s-scope-processing
    entrypoint: src/flows/scope_processing.py:scope_processing_flow
    work_pool: *k8s_pool
    build: []
    tags: [autodoc, scope-processing, dev-k8s]

  - name: dev-k8s-incremental
    entrypoint: src/flows/incremental_update.py:incremental_update_flow
    work_pool: *orchestrator_pool
    build: []
    tags: [autodoc, incremental, dev-k8s]

  # ---- Prod (full K8s) ----------------------------------------------------
  # Same baked-image pattern. Set AUTODOC_FLOW_IMAGE to your registry/tag.

  - name: prod-full-generation
    entrypoint: src/flows/full_generation.py:full_generation_flow
    work_pool: *orchestrator_pool
    build: []
    tags: [autodoc, full-generation, prod]

  - name: prod-scope-processing
    entrypoint: src/flows/scope_processing.py:scope_processing_flow
    work_pool: *k8s_pool
    build: []
    tags: [autodoc, scope-processing, prod]

  - name: prod-incremental
    entrypoint: src/flows/incremental_update.py:incremental_update_flow
    work_pool: *orchestrator_pool
    build: []
    tags: [autodoc, incremental, prod]
